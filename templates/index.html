<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Vocabulary Builder</title>
<link rel="stylesheet" href="/static/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- Background decoration -->
<div class="bg-glow"></div>

<div class="container">
  <header>
    <div class="logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
      </svg>
      <h1>VocabAI</h1>
    </div>
    <p class="subtitle">Expand your vocabulary with AI-powered insights</p>
  </header>

  <!-- Search Area -->
  <div class="search-area">
    <div class="input-wrapper">
      <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
      </svg>
      <input id="word" type="text" placeholder="Type a word to explore..." autocomplete="off" spellcheck="false">
      <button id="genBtn" onclick="gen()">
        <span class="btn-text">Generate</span>
        <svg class="btn-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>
        </svg>
      </button>
    </div>
    <p class="hint">Press <kbd>Enter</kbd> to generate</p>
  </div>

  <!-- Loading State -->
  <div class="loading-container" id="loading" style="display:none;">
    <div class="loading-card">
      <div class="loading-header">
        <div class="spinner"></div>
        <span class="loading-label">AI is thinking...</span>
      </div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progressBar"></div>
      </div>
      <div class="skeleton-lines">
        <div class="skeleton-line w-60"></div>
        <div class="skeleton-line w-90"></div>
        <div class="skeleton-line w-75"></div>
        <div class="skeleton-line w-50"></div>
        <div class="skeleton-line w-85"></div>
      </div>
      <p class="loading-tip" id="loadingTip">Analyzing word meaning...</p>
    </div>
  </div>

  <!-- Result Area -->
  <div class="result-container" id="resultContainer" style="display:none;">
    <div class="result-header">
      <h2 id="resultWord"></h2>
      <button class="copy-btn" onclick="copyResult()" title="Copy to clipboard">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect width="14" height="14" x="8" y="8" rx="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>
        </svg>
        <span>Copy</span>
      </button>
    </div>
    <div class="result-body" id="result"></div>
  </div>

  <!-- Error State -->
  <div class="error-container" id="errorContainer" style="display:none;">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/>
    </svg>
    <span id="errorMsg">Something went wrong. Please try again.</span>
  </div>
</div>

<script>
const tips = [
  "Analyzing word meaning...",
  "Finding example sentences...",
  "Searching for synonyms...",
  "Crafting a quiz question...",
  "Polishing the response..."
];

let progressInterval, tipInterval;

function showLoading() {
  document.getElementById("loading").style.display = "block";
  document.getElementById("resultContainer").style.display = "none";
  document.getElementById("errorContainer").style.display = "none";

  const bar = document.getElementById("progressBar");
  const tipEl = document.getElementById("loadingTip");
  let progress = 0;
  let tipIndex = 0;

  bar.style.width = "0%";
  bar.style.transition = "none";
  void bar.offsetWidth; // force reflow
  bar.style.transition = "width 0.4s ease";

  // Animate progress bar (slows down as it approaches 90%)
  progressInterval = setInterval(() => {
    if (progress < 90) {
      progress += Math.random() * (progress < 50 ? 8 : 3);
      progress = Math.min(progress, 90);
      bar.style.width = progress + "%";
    }
  }, 300);

  // Cycle through tips
  tipEl.textContent = tips[0];
  tipIndex = 1;
  tipInterval = setInterval(() => {
    tipEl.style.opacity = 0;
    setTimeout(() => {
      tipEl.textContent = tips[tipIndex % tips.length];
      tipEl.style.opacity = 1;
      tipIndex++;
    }, 200);
  }, 2000);
}

function hideLoading(success) {
  clearInterval(progressInterval);
  clearInterval(tipInterval);

  const bar = document.getElementById("progressBar");
  bar.style.width = "100%";

  setTimeout(() => {
    document.getElementById("loading").style.display = "none";
  }, 400);
}

function formatResult(text) {
  // Convert markdown-like formatting to HTML
  let html = text
    // Bold text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    // Numbered sections as cards
    .replace(/^(\d+)\.\s*(.+?)$/gm, '<div class="section-item"><span class="section-num">$1</span><span>$2</span></div>')
    // Line breaks
    .replace(/\n/g, '<br>');
  return html;
}

async function gen() {
  const input = document.getElementById("word");
  const word = input.value.trim();
  if (!word) {
    input.classList.add("shake");
    setTimeout(() => input.classList.remove("shake"), 500);
    return;
  }

  const btn = document.getElementById("genBtn");
  btn.disabled = true;
  btn.classList.add("loading");
  input.disabled = true;

  showLoading();

  try {
    const res = await fetch("/generate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ word })
    });

    if (!res.ok) throw new Error("Server error");

    const data = await res.json();
    hideLoading(true);

    setTimeout(() => {
      document.getElementById("resultWord").textContent = word.charAt(0).toUpperCase() + word.slice(1);
      document.getElementById("result").innerHTML = formatResult(data.result);
      document.getElementById("resultContainer").style.display = "block";
      document.getElementById("resultContainer").classList.add("fade-in");
    }, 450);

  } catch (err) {
    hideLoading(false);
    setTimeout(() => {
      document.getElementById("errorContainer").style.display = "flex";
      document.getElementById("errorMsg").textContent = "Failed to generate. Make sure Ollama is running and try again.";
    }, 450);
  } finally {
    btn.disabled = false;
    btn.classList.remove("loading");
    input.disabled = false;
    input.focus();
  }
}

function copyResult() {
  const text = document.getElementById("result").innerText;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector(".copy-btn span");
    btn.textContent = "Copied!";
    setTimeout(() => btn.textContent = "Copy", 1500);
  });
}

// Enter key support
document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("word").addEventListener("keydown", (e) => {
    if (e.key === "Enter") gen();
  });
});
</script>

</body>
</html>
