<!DOCTYPE html>
<html>
<head>
<title>AI Vocabulary Builder</title>
<style>
body{font-family:Arial;background:#f5f5f5;padding:40px;}
input{padding:10px;width:300px;}
button{padding:10px;background:black;color:white;}
.box{margin-top:20px;background:white;padding:20px;border-radius:8px;}
</style>
</head>
<body>

<h1>AI Vocabulary Builder</h1>

<input id="word" placeholder="Enter word">
<button onclick="gen()">Generate</button>

<div class="box" id="result"></div>

<script>
async function gen(){
    let word=document.getElementById("word").value;
    let res=await fetch("/generate",{
        method:"POST",
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({word})
    });
    let data=await res.json();
    document.getElementById("result").innerText=data.result;
}
</script>

</body>
</html>
